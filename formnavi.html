<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel System - Request Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-enter {
            animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .nav-active {
            background-color: #3b82f6;
            color: white !important;
            font-weight: 700;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Ensure input text doesn't zoom on iOS */
        input, select, textarea {
            font-size: 16px !important;
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen">

    <nav class="sticky top-0 z-50 bg-slate-900 text-white shadow-xl w-full">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between py-3">
                <div class="flex flex-nowrap gap-2 overflow-x-auto no-scrollbar items-center w-full">
                    <a href="index.html" class="px-3 py-2 rounded-xl text-xs sm:text-sm font-medium text-slate-300 hover:bg-slate-800 transition-all whitespace-nowrap">Admin Portal</a>
                    <a href="operatornavi.html" class="px-3 py-2 rounded-xl text-xs sm:text-sm font-medium text-slate-300 hover:bg-slate-800 transition-all whitespace-nowrap">Operator Portal</a>
                    <a href="tank.html" class="px-3 py-2 rounded-xl text-xs sm:text-sm font-medium text-slate-300 hover:bg-slate-800 transition-all whitespace-nowrap">Inventory Analysis</a>
                    <a href="formnavi.html" class="nav-active px-4 py-2 rounded-xl text-xs sm:text-sm whitespace-nowrap">Request Form</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="w-full flex flex-col items-center px-4 pt-6 pb-20 sm:pt-10">
        <div class="w-full max-w-md glass-morphism rounded-[2.5rem] shadow-2xl p-6 sm:p-10 border border-white">
            <div class="text-center mb-8">
                
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Fuel Request</h1>
            </div>

            <form id="fuelForm" class="space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Driver ID</label>
                        <input type="text" name="DriverID" list="driverList" required placeholder="e.g. DRV-9921" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none transition-all font-bold text-slate-700 bg-slate-50/50">
                        <datalist id="driverList">
                            <option value="D100-Mr.Saman"><option value="D101"><option value="D102"><option value="D103">
                        </datalist>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Lorry Number</label>
                        <input type="text" name="LorryNumber" list="lorryList" required placeholder="e.g. LP-4452" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none transition-all uppercase font-bold text-slate-700 bg-slate-50/50">
                        <datalist id="lorryList">
                            <option value="LP-4452"><option value="LP-7788"><option value="LP-2211"><option value="LP-9988">
                        </datalist>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Mileage</label>
                            <input type="number" name="Mileage" required placeholder="KM" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none transition-all font-bold text-slate-700 bg-slate-50/50">
                        </div>
                        <div>
                            <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Liters</label>
                            <input type="number" name="RequiredLiters" required placeholder="Qty" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none transition-all font-bold text-slate-700 bg-slate-50/50">
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="flex items-center bg-blue-50/50 p-4 rounded-2xl border border-blue-100 cursor-pointer group active:scale-[0.98] transition-all">
                        <input type="checkbox" id="externalPump" class="w-6 h-6 text-blue-600 border-slate-300 rounded-lg focus:ring-blue-500">
                        <span class="ml-3 text-sm font-black text-blue-800">External Pump Station?</span>
                    </label>

                    <label class="flex items-start bg-slate-50 p-4 rounded-2xl border border-slate-100 cursor-pointer">
                        <input type="checkbox" id="verifyCheck" required class="mt-0.5 w-5 h-5 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                        <span class="ml-3 text-xs font-bold text-slate-500 leading-snug">I confirm that all provided details are accurate.</span>
                    </label>
                </div>
               
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 transition-all active:scale-95 flex items-center justify-center text-lg">
                    Submit Request
                </button>
            </form>
        </div>
    </main>

    <div id="successModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm hidden">
        <div class="bg-white w-full max-w-xs rounded-[3rem] shadow-2xl p-10 text-center modal-enter">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-6 tracking-tight">Sent!</h2>
            <button onclick="closeModal()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">Dismiss</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwmYItD7fRU98E6bCjf3Hl_4ZpL75aDB2rRtpI96OIVRrhZpElhkpC1Y2jNrjQXjubR/exec';
        const form = document.getElementById('fuelForm');
        const btn = document.getElementById('submitBtn');
        const modal = document.getElementById('successModal');

        const USER_ID = "3138"; 
        const API_KEY = "pUj7jsXfXkzMu7isZVbK"; 
        const ADMIN_PHONE = "94742663624"; 

        function openModal() { modal.classList.remove('hidden'); }
        function closeModal() { modal.classList.add('hidden'); }

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            const driver = form.querySelector('[name="DriverID"]').value;
            const liters = form.querySelector('[name="RequiredLiters"]').value;
            const isExternal = document.getElementById('externalPump').checked;

            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Sending...`;

            const formData = new FormData(form);
            formData.append('StationType', isExternal ? 'External' : 'None');

            // 1. SMS Notification
            const smsMessage = `New Fuel Request: Driver ${driver} requested ${liters}L. (Station: ${isExternal ? 'External' : 'Internal'})`;
            const smsURL = `https://app.notify.lk/api/v1/send?user_id=${USER_ID}&api_key=${API_KEY}&sender_id=NotifyDEMO&to=${ADMIN_PHONE}&message=${encodeURIComponent(smsMessage)}`;

            fetch(smsURL, { mode: 'no-cors' });

            // 2. Data Submission
            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => {
                    openModal();
                    form.reset();
                    btn.disabled = false;
                    btn.innerHTML = "Submit Request";
                })
                .catch(error => {
                    alert("Submission Failed: " + error.message);
                    btn.disabled = false;
                    btn.innerHTML = "Try Again";
                });
        });
    </script>
</body>
</html>
